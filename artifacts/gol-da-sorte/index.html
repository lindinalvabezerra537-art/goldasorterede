<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>Gol da Sorte</title>
    <meta name="description" content="Jogue Gol da Sorte, ganhe jogadas e concorra a prêmios!" />
    <meta name="robots" content="index, follow" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gol da Sorte" />
    <meta name="theme-color" content="#FFD700" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph / WhatsApp -->
    <meta property="og:title" content="🏆 Gol da Sorte — Jogue e Ganhe!" />
    <meta property="og:description" content="Você foi convidado! Clique para jogar Gol da Sorte e ganhar jogadas grátis." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🏆 Gol da Sorte — Jogue e Ganhe!" />
    <meta name="twitter:description" content="Você foi convidado! Clique para jogar Gol da Sorte e ganhar jogadas grátis." />

    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Esconde completamente o badge "Made with Replit" */
      #replit-badge,
      .replit-badge,
      [id*="replit-badge"],
      [class*="replit-badge"],
      [data-replit-badge],
      .__replit_badge,
      .replit-dev-badge,
      [id*="replit"],
      [class*="replit"],
      iframe[src*="replit.com"],
      iframe[src*="replit"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
        overflow: hidden !important;
        position: absolute !important;
        left: -9999px !important;
      }
      /* Qualquer iframe injetado direto no body (o badge do Replit) */
      body > iframe {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var removed = new WeakSet();
        function zapBadge() {
          var selectors = [
            '#replit-badge','.replit-badge',
            '[id*="replit-badge"]','[class*="replit-badge"]',
            '[class*="replit-ui"]','[id*="replit"]',
            '[class*="replit"]','[data-replit]'
          ];
          selectors.forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) {
              if (!removed.has(el) && el.parentNode) {
                el.parentNode.removeChild(el);
                removed.add(el);
              }
            });
          });
          document.querySelectorAll('iframe').forEach(function(el) {
            var src = el.src || '';
            if (src.indexOf('replit') !== -1) {
              var target = el.parentElement && el.parentElement !== document.body ? el.parentElement : el;
              if (!removed.has(target) && target.parentNode) {
                target.parentNode.removeChild(target);
                removed.add(target);
              }
            }
          });
          document.querySelectorAll('a, div, span, aside, footer, section').forEach(function(el) {
            var txt = (el.textContent || '').toLowerCase().replace(/\s+/g,'');
            if ((txt.includes('madewithreplit') || txt.includes('builtwithr') || txt.includes('replit')) && el.children.length === 0) {
              var target = el.parentElement && el.parentElement !== document.body ? el.parentElement : el;
              if (!removed.has(target) && target.parentNode) {
                target.parentNode.removeChild(target);
                removed.add(target);
              }
            }
          });
        }
        zapBadge();
        var observer = new MutationObserver(zapBadge);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
